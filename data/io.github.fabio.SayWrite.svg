    <!-- smoother S flow -->
    <g fill="#A8FFFF">
      <rect x="320" y="232" width="420" height="80" rx="40"/>
      <rect x="260" y="352" width="340" height="80" rx="40"/> <!-- moved right -->
      <rect x="300" y="472" width="440" height="80" rx="40"/>
      <rect x="430" y="592" width="340" height="80" rx="40"/> <!-- moved left -->
      <rect x="280" y="712" width="420" height="80" rx="40"/>
    </g>
  </g>
</svg>
